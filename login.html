{% extends "base.html" %}
{% block title %}Log in — Lost & Found Portal{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <h1>Welcome back</h1>
    <p class="sub">Log in to report items and manage your claims.</p>
    <form method="post" action="{{ url_for('login') }}">
      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required value="{{ form.get('email','') }}">
      </div>
      <div class="form-row">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>
    <p class="form-footer-link">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
  </div>
</div>
{% endblock %}
