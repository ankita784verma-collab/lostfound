{% extends "base.html" %}
{% block title %}Server error{% endblock %}
{% block content %}
<div class="error-page">
  <span class="code">500</span>
  <h2>Something went wrong on our end</h2>
  <p>Please try again in a moment. If this keeps happening, check the Flask server logs.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top:16px;">Back to home</a>
</div>
{% endblock %}
